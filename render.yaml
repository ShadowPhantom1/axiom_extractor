services:
  - type: worker          # Background Worker — koi HTTP port nahi chahiye
    name: axiom-extractor
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: free            # Render ka free plan use karo
    envVars:
      - key: BOT_TOKEN
        sync: false       # Render Dashboard se manually set karo (secret)
      - key: TRIGGER_CMD
        value: .liketect  # Ya jo bhi trigger chahiye
